<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Coffee Hub - SCM System</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">📦 Coffee Hub SCM</a>
        </div>
    </nav>

    <div class="container">
        <div class="row text-center mb-4">
            <div class="col-md-4"><div class="card p-3 shadow-sm"><h5>Nhà cung cấp</h5><h3 id="supplier-count">0</h3></div></div>
            <div class="col-md-4"><div class="card p-3 shadow-sm"><h5>Đơn hàng mới</h5><h3 id="order-count">12</h3></div></div>
            <div class="col-md-4"><div class="card p-3 shadow-sm"><h5>Kho tồn</h5><h3 id="stock-count">85%</h3></div></div>
        </div>

        <div class="card shadow-sm p-3">
            <h4>Danh sách đối tác cung ứng</h4>
            <table class="table table-striped mt-3">
                <thead class="table-primary">
                    <tr><th>ID</th><th>Tên Đơn vị</th><th>Khu vực</th><th>Trạng thái</th><th>Hành động</th></tr>
                </thead>
                <tbody id="supplier-table">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
