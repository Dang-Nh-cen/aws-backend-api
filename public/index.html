<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Coffee Hub - SCM System</title>
    
    <style>
        :root { --brand-color: #5d4037; --accent-color: #8d6e63; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: var(--brand-color) !important; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .table thead { background-color: var(--brand-color); color: white; }
        .table-hover tbody tr:hover { background-color: #e9ecef; cursor: pointer; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">📦 Coffee Hub SCM</a>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Bảng điều khiển Nhà cung cấp</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">+ Thêm đối tác mới</button>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="row">
                    <div class="col-md-6"><div class="card p-3 shadow-sm mb-3"><h5>Nhà cung cấp</h5><h3 id="supplier-count">0</h3></div></div>
                    <div class="col-md-6"><div class="card p-3 shadow-sm mb-3"><h5>Kho tồn</h5><h3 id="stock-count">85%</h3></div></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 shadow-sm" style="height: 250px;">
                    <canvas id="supplierChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card shadow-sm p-3">
            <table class="table table-hover mt-3">
                <thead class="table-primary">
                    <tr><th>ID</th><th>Tên Đơn vị</th><th>Khu vực</th><th>Trạng thái</th><th>Hành động</th></tr>
                </thead>
                <tbody id="supplier-table"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content"><div class="modal-body">Tính năng đang phát triển...</div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let myChart = null;

        document.addEventListener('DOMContentLoaded', () => {
            init();
        });

        async function init() {
            try {
                const response = await fetch('/api/suppliers');
                const data = await response.json();
                
                const tbody = document.getElementById('supplier-table');
                document.getElementById('supplier-count').innerText = data.length;

                tbody.innerHTML = data.map(s => `
                    <tr class="align-middle">
                        <td>#${s.id}</td>
                        <td><strong>${s.name}</strong></td>
                        <td>${s.address}</td>
                        <td><span class="badge bg-success-subtle text-success">Active</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-warning me-2">Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteSupplier(${s.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');

                const areaCounts = data.reduce((acc, s) => {
                    acc[s.address] = (acc[s.address] || 0) + 1;
                    return acc;
                }, {});
                
                renderChart(Object.keys(areaCounts), Object.values(areaCounts));

            } catch (err) { 
                console.error('Lỗi khởi tạo:', err); 
            }
        }

        function renderChart(labels, values) {
            const ctx = document.getElementById('supplierChart').getContext('2d');
            
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{ data: values, backgroundColor: ['#5d4037', '#8d6e63', '#d7ccc8', '#a1887f'] }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function deleteSupplier(id) {
            if (confirm('Bạn chắc chắn muốn xóa đối tác này?')) {
                await fetch(`/api/suppliers/${id}`, { method: 'DELETE' });
                init(); 
            }
        }
    </script>
</body>
</html>
