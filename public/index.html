<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Coffee Hub - SCM System</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">📦 Coffee Hub SCM</a>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Bảng điều khiển Nhà cung cấp</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">+ Thêm đối tác mới</button>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="row">
                    <div class="col-md-6"><div class="card p-3 shadow-sm mb-3"><h5>Nhà cung cấp</h5><h3 id="supplier-count">0</h3></div></div>
                    <div class="col-md-6"><div class="card p-3 shadow-sm mb-3"><h5>Kho tồn</h5><h3 id="stock-count">85%</h3></div></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 shadow-sm" style="height: 250px;">
                    <canvas id="supplierChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card shadow-sm p-3">
            <table class="table table-hover mt-3">
                <thead class="table-primary">
                    <tr><th>ID</th><th>Tên Đơn vị</th><th>Khu vực</th><th>Trạng thái</th><th>Hành động</th></tr>
                </thead>
                <tbody id="supplier-table"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
