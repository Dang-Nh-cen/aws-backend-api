version: 0.2

phases:
  pre_build:
    commands:
      - echo "Đăng nhập vào Amazon ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 883627150844.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=883627150844.dkr.ecr.us-east-1.amazonaws.com/aws-backend-api
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
  build:
    commands:
      - echo "Bắt đầu đóng gói Docker image..."
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo "Đẩy thùng hàng lên kho ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Tạo file cấu hình cho ECS..."
      - printf '[{"name":"backend-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
artifacts:
  files: imagedefinitions.json